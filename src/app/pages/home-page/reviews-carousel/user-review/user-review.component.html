<div class="container">
    <div class="user-name">
        <h3>{{ review.name }}</h3>
    </div>
    <div class="stars">
        <span
            *ngFor="let star of [1,2,3,4,5]; let i = index"
            class="star"
            [ngClass]="{ 'active': star <= review.rating }"
        >
            &#9733;
        </span>
    </div>
    <div class="review">
        <!-- Define limit to 200 char -->
        <p>
            {{ review.comment }}
        </p>
    </div>
</div>
